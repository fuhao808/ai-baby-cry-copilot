name: ai_baby_cry_copilot
description: MVP Flutter client for recording baby cries and showing AI soothing guidance.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^10.3.2
  firebase_auth: ^5.3.4
  firebase_core: ^3.10.0
  firebase_storage: ^12.3.7
  flutter_riverpod: ^2.6.1
  intl: ^0.20.1
  just_audio: ^0.10.5
  lottie: ^3.3.1
  path_provider: ^2.1.5
  record: ^6.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
